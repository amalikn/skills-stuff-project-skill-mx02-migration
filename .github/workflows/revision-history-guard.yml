name: Specialist Revision History Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require REVISION_HISTORY.md update when specialist content changes
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            echo "No comparable base SHA; skipping diff-based policy check."
            exit 0
          fi

          changed="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"
          echo "${changed}"

          # Ignore revision-only commits.
          non_history="$(echo "${changed}" | grep -v '^REVISION_HISTORY.md$' || true)"
          if [ -n "${non_history}" ]; then
            if ! echo "${changed}" | grep -q '^REVISION_HISTORY.md$'; then
              echo "ERROR: specialist content changed without REVISION_HISTORY.md update."
              exit 1
            fi
          fi
